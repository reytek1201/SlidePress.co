# Hobby Vercel plans only allow daily crons — trigger publish-scheduled-posts every 5 min here.
# Requires repository secret CRON_SECRET (same value as Vercel env CRON_SECRET).
# Push to this file on main also fires the job (repo activity + manual wake-up).

name: Publish scheduled posts

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-scheduled-posts.yml"
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  fire:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish-scheduled-posts
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET repository secret is not set"
            exit 1
          fi
          curl -fsS -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://www.slidepress.co/api/cron/publish-scheduled-posts"
