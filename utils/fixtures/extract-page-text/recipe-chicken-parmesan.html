  <h1>High Protein Baked Chicken Parmesan</h1>
  <p>Tender baked chicken breast is topped with rich marinara sauce and melted mozzarella for a healthier, high-protein take on a classic Italian-American comfort food.</p>
  <h2>Ingredients</h2>
  <ul><li>4 6oz chicken breasts</li><li>1/2 cup almond flour</li><li>1 cup low-sugar marinara sauce</li></ul>
  <h2>Instructions</h2>
  <p>Preheat your oven to 400°F. Line a baking sheet with parchment paper. Pat the chicken breasts dry and season both sides with salt and pepper.</p>
